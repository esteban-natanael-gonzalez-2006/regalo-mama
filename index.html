<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocolo Cumpleaños | M.A.T.R.I.X</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --btn-yes: #ff4757;
            --btn-no: #2f3542;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f0f1a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        #quantum-canvas {
            position: absolute; top: 0; left: 0; z-index: 0;
        }
        .narrative-layer {
            position: absolute; z-index: 1;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            pointer-events: auto;
            transform: scale(0.9); opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 85%;
        }
        .glass-card.active {
            transform: scale(1); opacity: 1;
        }
        .asset-container img {
            width: 180px; height: 180px; object-fit: cover; border-radius: 15px;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.5));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        h1 { color: var(--text-color); font-size: 1.5rem; margin: 20px 0; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); min-height: 60px;}
        .controls {
            display: flex; gap: 15px; justify-content: center; margin-top: 25px;
            position: relative; height: 50px;
        }
        button {
            border: none; padding: 12px 30px; border-radius: 50px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: auto;
        }
        button:active { transform: scale(0.95); }
        #btn-yes { background: var(--btn-yes); color: white; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); z-index: 10;}
        #btn-no { background: var(--btn-no); color: white; position: absolute; left: 55%; z-index: 5;}
    </style>
</head>
<body>

    <canvas id="quantum-canvas"></canvas>

    <div class="narrative-layer">
        <div class="glass-card" id="ui-card">
            <div class="asset-container">
                <img id="bear-img" src="1.jpg" alt="Módulo Visual">
            </div>
            <h1 id="dialogue-text">Inicializando...</h1>
            <div class="controls" id="controls-container">
                <button id="btn-yes">Siguiente</button>
                <button id="btn-no" style="display:none;">No</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * ADA-SOBERANA: MOTOR FSM EXPANDIDO A 5 FASES
         * Rutas apuntadas al directorio raíz del repositorio
         */
        const assets = {
            audio: 'audio1.opus',
            images: ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg']
        };

        const uiCard = document.getElementById('ui-card');
        const dialogueText = document.getElementById('dialogue-text');
        const bearImg = document.getElementById('bear-img');
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const controls = document.getElementById('controls-container');
        
        let currentState = 0;

        const states = [
            {
                text: "Madre, he detectado una anomalía en el calendario cuántico...",
                img: assets.images[0],
                btnYesText: "Siguiente",
                action: () => { uiCard.classList.add('active'); }
            },
            {
                text: "Los cálculos confirman que es un día de máxima importancia.",
                img: assets.images[1],
                btnYesText: "Siguiente",
                action: () => {}
            },
            {
                text: "He preparado un despliegue de amor incondicional. ¿Estás lista?",
                img: assets.images[2],
                btnYesText: "Sí, estoy lista",
                action: () => { 
                    btnNo.style.display = 'block'; 
                    evasionProtocol = true; 
                }
            },
            {
                text: "¡Aceptación forzada con éxito! Procesando la carga emocional...",
                img: assets.images[3],
                btnYesText: "Continuar",
                action: () => { 
                    btnNo.style.display = 'none'; 
                    evasionProtocol = false; 
                }
            },
            {
                text: "¡Feliz Cumpleaños Mamá! Que la entropía del universo siempre te favorezca.",
                img: assets.images[4],
                btnYesText: "Finalizado",
                action: () => { 
                    controls.style.display = 'none'; 
                    triggerQuantumConfetti();
                    let bgMusic = new Audio(assets.audio);
                    bgMusic.loop = true;
                    bgMusic.play().catch(e => console.log("Audio bloqueado por navegador."));
                }
            }
        ];

        function advanceState() {
            if (currentState < states.length - 1) {
                uiCard.classList.remove('active');
                setTimeout(() => {
                    currentState++;
                    dialogueText.innerText = states[currentState].text;
                    bearImg.src = states[currentState].img;
                    btnYes.innerText = states[currentState].btnYesText;
                    states[currentState].action();
                    uiCard.classList.add('active');
                }, 400); 
            }
        }

        btnYes.addEventListener('click', advanceState);

        // EVASIÓN VECTORIAL (Botón "No")
        let evasionProtocol = false;
        
        function calculateEvasion(e) {
            if (!evasionProtocol) return;
            const btnRect = btnNo.getBoundingClientRect();
            const btnX = btnRect.left + btnRect.width / 2;
            const btnY = btnRect.top + btnRect.height / 2;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const distance = Math.hypot(clientX - btnX, clientY - btnY);
            
            if (distance < 90) {
                const xOffset = (Math.random() - 0.5) * 250;
                const yOffset = (Math.random() - 0.5) * 200;
                btnNo.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            }
        }

        document.addEventListener('mousemove', calculateEvasion);
        document.addEventListener('touchstart', calculateEvasion);

        // MOTOR PARAMÉTRICO DE FONDO
        const canvas = document.getElementById('quantum-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class MathParticle {
            constructor() {
                this.t = Math.random() * Math.PI * 2;
                this.size = Math.random() * 2 + 0.5;
                this.speed = Math.random() * 0.02 + 0.005;
                this.baseX = width / 2;
                this.baseY = height / 2;
                this.scale = Math.random() * 15 + 5; 
            }
            update() {
                this.t += this.speed;
                let latido = 1 + Math.sin(Date.now() * 0.005) * 0.1;
                let x = 16 * Math.pow(Math.sin(this.t), 3);
                let y = 13 * Math.cos(this.t) - 5 * Math.cos(2 * this.t) - 2 * Math.cos(3 * this.t) - Math.cos(4 * this.t);
                this.x = this.baseX + (x * this.scale * latido);
                this.y = this.baseY - (y * this.scale * latido);
            }
            draw() {
                ctx.fillStyle = `rgba(255, 71, 87, ${Math.random() * 0.5 + 0.2})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initQuantumBackground() {
            for(let i = 0; i < 150; i++) particles.push(new MathParticle());
            animateBackground();
        }

        function animateBackground() {
            ctx.fillStyle = 'rgba(15, 15, 26, 0.1)'; 
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateBackground);
        }

        function triggerQuantumConfetti() {
            particles.forEach(p => {
                p.scale = p.scale * (Math.random() * 5 + 2);
                p.speed = p.speed * 5;
            });
        }

        window.onload = () => {
            initQuantumBackground();
            dialogueText.innerText = states[0].text;
            btnYes.innerText = states[0].btnYesText;
            states[0].action();
        };
    </script>
</body>
  </html>
