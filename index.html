<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocolo Cumpleaños | M.A.T.R.I.X</title>
    <style>
        /* CSS: Arquitectura Base y Optimización GPU */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --btn-yes: #ff4757;
            --btn-no: #2f3542;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f0f1a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Previene scroll no deseado */
            touch-action: manipulation;
        }
        #quantum-canvas {
            position: absolute; top: 0; left: 0; z-index: 0;
        }
        .narrative-layer {
            position: absolute; z-index: 1;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none; /* Delegación de eventos */
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            pointer-events: auto;
            transform: scale(0.9); opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 85%;
        }
        .glass-card.active {
            transform: scale(1); opacity: 1;
        }
        .asset-container img {
            width: 180px; height: 180px; object-fit: contain;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.5));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        h1 { color: var(--text-color); font-size: 1.8rem; margin: 20px 0; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}
        .controls {
            display: flex; gap: 15px; justify-content: center; margin-top: 25px;
            position: relative; height: 50px;
        }
        button {
            border: none; padding: 12px 30px; border-radius: 50px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:active { transform: scale(0.95); }
        #btn-yes { background: var(--btn-yes); color: white; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }
        #btn-no { background: var(--btn-no); color: white; position: absolute; left: 55%; /* Posición inicial relativa al centro */ }
    </style>
</head>
<body>

    <canvas id="quantum-canvas"></canvas>

    <div class="narrative-layer">
        <div class="glass-card" id="ui-card">
            <div class="asset-container">
                <img id="bear-img" src="https://media.tenor.com/images/9920152434526b701fc3c8a9010214c7/tenor.gif" alt="Ositos">
            </div>
            <h1 id="dialogue-text">Iniciando protocolo...</h1>
            <div class="controls" id="controls-container">
                <button id="btn-yes">Sí</button>
                <button id="btn-no">No</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * ADA-SOBERANA: MOTOR DE ESTADOS Y FÍSICAS VECTORIALES
         */

        // 1. DICCIONARIO DE ACTIVOS (Assets)
        // Sustituye estas URLs por tus propios GIFs y el archivo de audio.
        const assets = {
            audio: 'ruta/a/tu/pista_musical.mp3', // <-- INYECTAR AUDIO AQUÍ
            images: {
                phase1: 'https://media.tenor.com/images/9920152434526b701fc3c8a9010214c7/tenor.gif', // Oso preguntando
                phase2: 'https://media.tenor.com/GfSZsEGhIcwAAAAi/bubu-dudu-kisses.gif',            // Oso feliz / besos
                phase3: 'https://media.tenor.com/images/47b8194dc1ce907817eb48bfa9822a84/tenor.gif'  // Oso celebrando
            }
        };

        // 2. MÁQUINA DE ESTADOS FINITOS (FSM)
        const uiCard = document.getElementById('ui-card');
        const dialogueText = document.getElementById('dialogue-text');
        const bearImg = document.getElementById('bear-img');
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const controls = document.getElementById('controls-container');
        
        let currentState = 0;
        let audioContext = null; // Preparación para Web Audio API

        const states = [
            {
                text: "Madre, he detectado una anomalía temporal. ¿Es hoy tu cumpleaños?",
                img: assets.images.phase1,
                action: () => { uiCard.classList.add('active'); }
            },
            {
                text: "Procesando... ¡Verificado! Preparando despliegue de amor incondicional. ¿Estás lista?",
                img: assets.images.phase1,
                action: () => { btnNo.style.display = 'block'; evasionProtocol = true; }
            },
            {
                text: "¡Feliz Cumpleaños Mamá! Que la entropía del universo siempre te favorezca.",
                img: assets.images.phase3,
                action: () => { 
                    controls.style.display = 'none'; 
                    evasionProtocol = false;
                    triggerQuantumConfetti();
                    // Intentar reproducir audio (requiere interacción previa del usuario)
                    let bgMusic = new Audio(assets.audio);
                    bgMusic.loop = true;
                    bgMusic.play().catch(e => console.log("Audio bloqueado por políticas del navegador."));
                }
            }
        ];

        function advanceState() {
            if (currentState < states.length - 1) {
                uiCard.classList.remove('active');
                setTimeout(() => {
                    currentState++;
                    dialogueText.innerText = states[currentState].text;
                    bearImg.src = states[currentState].img;
                    states[currentState].action();
                    uiCard.classList.add('active');
                }, 500); // Tiempo de transición
            }
        }

        btnYes.addEventListener('click', advanceState);

        // 3. PROTOCOLO DE EVASIÓN VECTORIAL (Botón "No")
        let evasionProtocol = false;
        
        // Evadir al mover el ratón (Desktop) o tocar cerca (Mobile)
        function calculateEvasion(e) {
            if (!evasionProtocol) return;
            
            const btnRect = btnNo.getBoundingClientRect();
            const btnX = btnRect.left + btnRect.width / 2;
            const btnY = btnRect.top + btnRect.height / 2;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Distancia Euclidiana
            const distance = Math.hypot(clientX - btnX, clientY - btnY);
            
            // Radio de activación (umbral de evento)
            if (distance < 100) {
                // Cálculo de vector de escape aleatorio dentro del contenedor
                const xOffset = (Math.random() - 0.5) * 200;
                const yOffset = (Math.random() - 0.5) * 150;
                
                btnNo.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            }
        }

        document.addEventListener('mousemove', calculateEvasion);
        document.addEventListener('touchstart', calculateEvasion);

        // 4. MOTOR PARAMÉTRICO DE FONDO (Alternativa B)
        const canvas = document.getElementById('quantum-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class MathParticle {
            constructor() {
                this.t = Math.random() * Math.PI * 2;
                this.size = Math.random() * 2 + 0.5;
                this.speed = Math.random() * 0.02 + 0.005;
                this.baseX = width / 2;
                this.baseY = height / 2;
                // Amplitud variable para profundidad
                this.scale = Math.random() * 15 + 5; 
            }
            update() {
                this.t += this.speed;
                // Ecuación paramétrica del corazón latente
                let latido = 1 + Math.sin(Date.now() * 0.005) * 0.1;
                
                let x = 16 * Math.pow(Math.sin(this.t), 3);
                let y = 13 * Math.cos(this.t) - 5 * Math.cos(2 * this.t) - 2 * Math.cos(3 * this.t) - Math.cos(4 * this.t);
                
                this.x = this.baseX + (x * this.scale * latido);
                this.y = this.baseY - (y * this.scale * latido); // Invertir Y para canvas
            }
            draw() {
                ctx.fillStyle = `rgba(255, 71, 87, ${Math.random() * 0.5 + 0.2})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initQuantumBackground() {
            for(let i = 0; i < 150; i++) particles.push(new MathParticle());
            animateBackground();
        }

        function animateBackground() {
            ctx.fillStyle = 'rgba(15, 15, 26, 0.1)'; // Estela de movimiento
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateBackground);
        }

        function triggerQuantumConfetti() {
            // Expansión masiva de la escala para simular explosión
            particles.forEach(p => {
                p.scale = p.scale * (Math.random() * 5 + 2);
                p.speed = p.speed * 5;
            });
        }

        // Inicialización del sistema
        window.onload = () => {
            initQuantumBackground();
            dialogueText.innerText = states[0].text;
            states[0].action();
        };
    </script>
</body>
  </html>
